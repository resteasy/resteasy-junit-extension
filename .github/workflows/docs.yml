name: Build and Deploy Documentation to GitHub Pages

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0, v1.0.0.Beta1, etc.

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  MVN_CMD: './mvnw -V -B'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'
          cache: 'maven'

      # Build everything: Javadoc and AsciiDoc documentation
      - name: Build Javadoc and Documentation
        run: |
          # Generate aggregated Javadoc
          ${{ env.MVN_CMD }} clean javadoc:aggregate -Pcentral-release
          # Build AsciiDoc documentation
          ${{ env.MVN_CMD }} process-resources -pl docs

      # Prepare site structure combining docs and Javadocs
      - name: Prepare site structure
        run: |
          mkdir -p _site
          # Copy main documentation HTML and assets
          cp -r docs/target/generated-docs/* _site/
          # Copy Javadoc to apidocs subdirectory
          cp -r target/reports/apidocs _site/apidocs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '_site/'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
